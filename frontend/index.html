<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TechPro Customer Service</title>
<style>
  :root {
    --bg:          #1a1a2e;
    --surface:     #16213e;
    --surface2:    #0f3460;
    --accent:      #e94560;
    --accent2:     #533483;
    --user-bubble: #e94560;
    --bot-bubble:  #1e2a45;
    --text:        #e8e8f0;
    --text-muted:  #8892a4;
    --border:      #2a3555;
    --online:      #4ade80;
    --shadow:      0 4px 24px rgba(0,0,0,.45);
    --radius:      18px;
    --font:        'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--font);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  /* ── Widget ── */
  .chat-widget {
    width: 100%; max-width: 430px; height: 690px;
    background: var(--surface);
    border-radius: 24px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* ── Header ── */
  .chat-header {
    background: linear-gradient(135deg, var(--surface2), var(--accent2));
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(233,69,96,.3);
  }
  .header-info { flex: 1; }
  .header-name { font-weight: 700; font-size: 15px; color: #fff; }
  .header-status {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--online); margin-top: 2px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--online); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .btn-reset {
    background: rgba(255,255,255,.12); border: none; color: #fff;
    border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px;
    transition: background .2s;
  }
  .btn-reset:hover { background: rgba(255,255,255,.22); }

  /* ── Messages ── */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 90%; }
  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .msg.user .msg-avatar { background: var(--accent); }

  .bubble {
    padding: 11px 15px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.55;
    color: var(--text); word-break: break-word;
  }
  .msg.bot  .bubble {
    background: var(--bot-bubble); border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }
  .msg.user .bubble {
    background: var(--user-bubble); border-bottom-right-radius: 4px; color: #fff;
  }
  .bubble strong { font-weight: 700; }

  /* Intent badge */
  .intent-badge {
    font-size: 11px; color: var(--text-muted);
    margin-top: 4px; padding-left: 4px;
  }

  /* Error */
  .error-bar {
    background: rgba(233,69,96,.15);
    border: 1px solid rgba(233,69,96,.45);
    color: #f87171; border-radius: 10px;
    padding: 10px 14px; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
    align-self: stretch;
  }

  /* Typing */
  .typing .bubble { display: flex; align-items: center; gap: 5px; padding: 14px 18px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.2s infinite; }
  .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  /* ── Quick Replies ── */
  .quick-replies {
    padding: 4px 16px 12px;
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .qr-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: 20px;
    padding: 7px 14px; font-size: 13px;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .qr-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Input ── */
  .chat-input-area {
    padding: 12px 16px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .chat-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 24px; padding: 11px 18px;
    color: var(--text); font-size: 14px; font-family: var(--font);
    outline: none; resize: none; transition: border-color .2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); border: none; color: #fff;
    font-size: 18px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, background .2s;
  }
  .send-btn:hover { background: #c73652; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<div class="chat-widget">

  <!-- Header -->
  <div class="chat-header">
    <div class="avatar">🎧</div>
    <div class="header-info">
      <div class="header-name">TechPro Customer Service</div>
      <div class="header-status"><span class="status-dot"></span> Online</div>
    </div>
    <button class="btn-reset" onclick="clearChat()">↺ Reset</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="messages"></div>

  <!-- Quick Replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="qr-btn" onclick="sendQuick('Harga laptop TechPro X1?')">Harga laptop TechPro X1?</button>
    <button class="qr-btn" onclick="sendQuick('Laptop saya rusak')">Laptop saya rusak</button>
    <button class="qr-btn" onclick="sendQuick('Jam buka toko?')">Jam buka toko?</button>
    <button class="qr-btn" onclick="sendQuick('Bicara dengan admin')">Bicara dengan admin</button>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea id="chatInput" class="chat-input" placeholder="Ketik pesan Anda..." rows="1"
      onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
const API_URL   = window.location.origin;   // sama origin dengan server FastAPI
const SESSION_ID = 'sess_' + Math.random().toString(36).slice(2);
let history = [];
let isWaiting = false;

/* ── Helpers ── */
function md(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function scrollBottom() {
  const w = document.getElementById('messages');
  w.scrollTop = w.scrollHeight;
}

/* ── Append message ── */
function appendMsg(role, content, intent) {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'bot' ? '🎧' : '👤';

  const bbl = document.createElement('div');
  bbl.className = 'bubble';
  bbl.innerHTML = md(content);

  div.appendChild(av);
  div.appendChild(bbl);

  // Show intent badge under bot messages
  if (role === 'bot' && intent && intent !== 'unknown') {
    const badge = document.createElement('div');
    badge.className = 'intent-badge';
    badge.textContent = `🏷 intent: ${intent}`;
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.appendChild(div);
    wrapper.appendChild(badge);
    wrap.appendChild(wrapper);
    scrollBottom();
    return;
  }

  wrap.appendChild(div);
  scrollBottom();
}

/* ── Error bar ── */
function appendError(msg) {
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'error-bar';
  el.innerHTML = `⚠️ ${msg}`;
  wrap.appendChild(el);
  scrollBottom();
}

/* ── Typing indicator ── */
function showTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typing'; div.className = 'msg bot typing';
  div.innerHTML = `<div class="msg-avatar">🎧</div>
    <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  wrap.appendChild(div); scrollBottom();
}
function removeTyping() {
  const t = document.getElementById('typing'); if (t) t.remove();
}

/* ── Send message ── */
async function sendMessage(override) {
  const input = document.getElementById('chatInput');
  const text  = (override || input.value).trim();
  if (!text || isWaiting) return;

  input.value = ''; input.style.height = 'auto';
  isWaiting = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('quickReplies').style.display = 'none';

  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(`${API_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: SESSION_ID,
        message: text,
        history: history.slice(-10)   // kirim 10 pesan terakhir sebagai konteks
      })
    });

    removeTyping();

    if (!res.ok) {
      appendError(`Server error ${res.status} — cek terminal uvicorn.`);
    } else {
      const data = await res.json();
      appendMsg('bot', data.response, data.intent);
      history.push({ role: 'assistant', content: data.response });
    }
  } catch (e) {
    removeTyping();
    appendError(`Tidak dapat terhubung ke server. Pastikan server sudah berjalan di <code>${API_URL}</code>`);
  } finally {
    isWaiting = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function sendQuick(text) { sendMessage(text); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
  document.getElementById('quickReplies').style.display = '';
  history = [];
  showWelcome();
}

function showWelcome() {
  appendMsg('bot', 'Halo! Selamat datang di TechPro Customer Service 👋 Saya siap membantu Anda dengan pertanyaan seputar produk, keluhan, atau informasi lainnya. Ada yang bisa saya bantu?');
}

/* Auto-resize textarea */
document.getElementById('chatInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

showWelcome();
</script>
</body>
</html>
